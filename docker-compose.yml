version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: aidenumerique37_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Port exposé uniquement en développement local
    # En production, retirer cette ligne pour ne pas exposer MongoDB
    ports:
      - "127.0.0.1:27017:27017"

  backend:
    build:
      context: .          # Racine du projet (nécessaire pour accéder à frontend/)
      dockerfile: backend/Dockerfile
    container_name: aidenumerique37_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGO_URL=mongodb://mongo:27017
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8001:8001"
    depends_on:
      - mongo

volumes:
  mongo_data:
